<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toyoto Gosei Horohalli Private Limited</title>
    <style>
      :root {
        --surface: #ffffff;
        --surface-2: #f5f6f8;
        --border: #d5d7dc;
        --text: #1f2937;
        --muted: #4b5563;
        --primary: #0b60b1;
        --danger: #b91c1c;
        --success: #1a7f37;
        --shadow: rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #f4f6fb 0%,
          #ffffff 55%,
          #f9fafb 100%
        );
        color: var(--text);
      }

      header {
        padding: 1.1rem 1.5rem;
        border-bottom: 1px solid var(--border);
        background: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 1px 8px var(--shadow);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      header .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      header .brand .logo {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(120deg, var(--primary), #5c7cfd);
        display: grid;
        place-items: center;
        color: white;
        font-weight: 700;
        font-size: 1.1rem;
      }

      header .brand .title {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
      }

      header .brand .title span:first-child {
        font-size: 1.1rem;
        font-weight: 700;
      }

      header .brand .title span:last-child {
        font-size: 0.85rem;
        color: var(--muted);
      }

      main {
        padding: 2rem 1.5rem 3rem;
        display: flex;
        justify-content: center;
      }

      .container {
        width: min(900px, 100%);
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1.25rem;
        margin-bottom: 1.6rem;
        border-radius: 14px;
        box-shadow: 0 4px 12px var(--shadow);
      }

      .section h2 {
        margin-top: 0;
      }

      .badge {
        display: inline-block;
        padding: 0.25rem 0.65rem;
        border-radius: 999px;
        font-weight: 600;
        margin-top: 0.5rem;
        font-size: 0.875rem;
      }

      .badge.green {
        background: var(--success);
        color: #fff;
      }

      .badge.red {
        background: var(--danger);
        color: #fff;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.75rem;
        align-items: center;
        margin-top: 1rem;
      }

      input[type="file"] {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.75rem 0.85rem;
        width: 100%;
        font-size: 1rem;
      }

      button {
        border-radius: 10px;
        border: 1px solid transparent;
        background: var(--primary);
        color: white;
        padding: 0.8rem 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      button:hover:not(:disabled) {
        background: #0a4c8d;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      #dataset-results {
        display: grid;
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .result {
        border: 1px solid var(--border);
        padding: 0.9rem;
        border-radius: 12px;
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 1rem;
        align-items: center;
        background: #ffffff;
      }

      .result img {
        width: 120px;
        height: auto;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
      }

      .scratch-marker {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: 2px solid rgba(219, 39, 119, 0.9);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .result .info {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.95rem;
      }

      .result .overlay-box {
        position: absolute;
        border: 2px dashed rgba(219, 39, 119, 0.75);
        background: rgba(219, 39, 119, 0.08);
        pointer-events: none;
      }

      .result .scratch-circle {
        position: absolute;
        border: 2px dashed rgba(219, 39, 119, 0.9);
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      .result .info .title {
        font-weight: 700;
      }

      .warning {
        color: var(--danger);
        font-weight: 700;
      }

      @media (max-width: 520px) {
        .result {
          grid-template-columns: 1fr;
          text-align: center;
        }

        .result img {
          margin: 0 auto;
        }

        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">TG</div>
        <div class="title">
          <span>Toyoto Gosei Horohalli</span>
          <span>Private Limited</span>
        </div>
      </div>
      <div class="branding">
        <div style="font-size: 0.9rem; color: var(--muted)">
          Defect detection demo
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="section">
          <h2>Upload part images</h2>
          <p>
            Choose one or more images of the part you want to inspect (e.g., a
            surface panel or component). The system will highlight areas likely
            to contain scratches or surface defects.
          </p>

          <div class="controls">
            <input id="files" type="file" multiple accept="image/*" />
            <button id="run" disabled>Analyze selected images</button>
          </div>

          <div id="dataset-results"></div>
        </section>
      </div>
    </main>

    <script>
      const filesInput = document.getElementById("files");
      const runBtn = document.getElementById("run");
      const resultsContainer = document.getElementById("dataset-results");

      filesInput.addEventListener("change", () => {
        runBtn.disabled = filesInput.files.length === 0;
      });

      function createResultCard(filename, report) {
        const card = document.createElement("div");
        card.className = "result";

        const imageWrapper = document.createElement("div");
        imageWrapper.style.position = "relative";
        imageWrapper.style.width = "120px";
        imageWrapper.style.height = "auto";

        const img = document.createElement("img");
        img.src = report.preview || "";
        img.alt = filename;
        img.style.display = "block";

        imageWrapper.appendChild(img);

        if (report.bbox) {
          const centerX = (report.bbox.x0 + report.bbox.x1) / 2;
          const centerY = (report.bbox.y0 + report.bbox.y1) / 2;
          const width = report.bbox.x1 - report.bbox.x0;
          const height = report.bbox.y1 - report.bbox.y0;
          const radius = Math.max(width, height) * 0.75;

          const circle = document.createElement("div");
          circle.className = "scratch-circle";
          circle.style.left = `${centerX * 100}%`;
          circle.style.top = `${centerY * 100}%`;
          circle.style.width = `${radius * 100}%`;
          circle.style.height = `${radius * 100}%`;
          imageWrapper.appendChild(circle);
        }

        const info = document.createElement("div");
        info.className = "info";

        const title = document.createElement("div");
        title.textContent = filename;
        title.style.fontWeight = "700";

        const status = document.createElement("div");
        if (!report.ok) {
          status.textContent = report.error || "Analysis failed";
          status.className = "warning";
        } else {
          status.innerHTML = `
            <strong>Result:</strong> ${report.result}<br>
            <strong>Reason:</strong> ${report.reason}<br>
            <strong>Confidence:</strong> ${report.confidence.toFixed(1)}%
          `;
          status.className =
            report.result === "DEFECT" ? "badge red" : "badge green";
        }

        info.appendChild(title);
        info.appendChild(status);

        card.appendChild(imageWrapper);
        card.appendChild(info);
        return card;
      }

      async function analyzeDataset() {
        resultsContainer.innerHTML = "";
        const formData = new FormData();

        for (const file of filesInput.files) {
          formData.append("files", file, file.name);
        }

        runBtn.disabled = true;
        runBtn.textContent = "Analyzing...";

        try {
          const res = await fetch("/api/detect-dataset", {
            method: "POST",
            body: formData,
          });

          const json = await res.json();
          if (!json.ok) {
            resultsContainer.textContent =
              json.error || "Dataset analysis failed";
            return;
          }

          for (const item of json.results) {
            resultsContainer.appendChild(
              createResultCard(item.filename, item.report),
            );
          }
        } catch (err) {
          resultsContainer.textContent = "Network or server error";
          console.error(err);
        } finally {
          runBtn.disabled = false;
          runBtn.textContent = "Analyze selected images";
        }
      }

      runBtn.addEventListener("click", analyzeDataset);
    </script>
  </body>
</html>
